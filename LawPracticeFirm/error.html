
<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <title>MyKase</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #00967f;
            font-family: arial;
        }

        .logo {
            margin: 0;
            padding: 0;
            text-align: center;
        }


        .box {
            text-align: center;
            position: relative;
        }

            .box div {
                width: 600px;
                margin: 225px auto 0;
                height: 80px;
                line-height: 80px;
                color: #ffc900;
                background-color: #fff;
                font-size: 280%;
                text-transform: capitalize;
                animation: moving 8s linear infinite;
                -webkit-animation: moving 8s linear infinite;
                -moz-animation: moving 8s linear infinite;
                -o-animation: moving 8s linear infinite;
                transform-origin: 50% -400%;
                -webkittransform-origin: 50% -400%;
                -moz-transform-origin: 50% -400%;
                -o-transform-origin: 50% -400%;
                border-radius: 10px;
            }

                .box div:before {
                    content: "";
                    width: 25px;
                    height: 25px;
                    background-color: #fff;
                    border-radius: 50%;
                    display: block;
                    position: absolute;
                    left: 45%;
                    top: -220px;
                }

                .box div:after {
                    content: "";
                    width: 3px;
                    height: 200px;
                    background-color: #fff;
                    display: block;
                    position: absolute;
                    left: 47%;
                    top: -200px;
                }

            .box p {
                margin: 20px auto 0;
                font-weight: 700;
                text-transform: uppercase;
                color: #fff;
                width: 370px
            }

                .box p span {
                    display: block;
                    font-size: 300%
                }

        a {
            background: #fff;
            padding: 10px;
            color: #00967f;
            border-radius: 4px;
            text-decoration: none;
        }

            a:hover {
                background: #ccc;
                padding: 10px;
                color: #00967f;
                border-radius: 4px;
                text-decoration: none;
            }

        @keyframes moving {
            0%,100% {
                transform: rotate(0)
            }

            25% {
                transform: rotate(3deg);
            }

            50% {
                transform: rotate(-3deg)
            }
        }

        @-webkit-keyframes moving {
            0%,100% {
                transform: rotate(0)
            }

            25% {
                transform: rotate(3deg);
            }

            50% {
                transform: rotate(-3deg)
            }
        }

        @-moz-keyframes moving {
            0%,100% {
                transform: rotate(0)
            }

            25% {
                transform: rotate(3deg);
            }

            50% {
                transform: rotate(-3deg)
            }
        }

        @-o-keyframes moving {
            0%,100% {
                transform: rotate(0)
            }

            25% {
                transform: rotate(3deg);
            }

            50% {
                transform: rotate(-3deg)
            }
        }
    </style>
</head>

<body>

    <div class="logo"><img src="/Manupanel/img/mykase.png" width="110" height="36"></div>
    <div class="box">
        <div>
            Unauthorized Authentication !
        </div>
        <p>
            <span>Sorry !</span> You don't have the proper credentials to access this page. <br><br><br><br>
            <a href="/home">Home Page</a>
        </p>
    </div>
</body>
</html>
